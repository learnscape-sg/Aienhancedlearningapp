
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, minimum-scale=0.5, viewport-fit=cover, user-scalable=yes" />
      <title>AI Enhanced Learning App</title>
      <script>
        (function(){
          var tenantId = '';
          try {
            var q = new URL(window.location.href).searchParams.get('tenantId') || '';
            if (q) tenantId = q.trim();
            if (!tenantId) tenantId = (localStorage.getItem('runtimeTenantId') || '').trim();
            if (!tenantId) tenantId = (localStorage.getItem('tenantId') || '').trim();
            if (tenantId === 'tenant_cn_bamboo') {
              document.documentElement.setAttribute('data-tenant-compat', 'true');
              var vp = document.querySelector('meta[name=viewport]');
              if (vp) vp.setAttribute('content', 'width=1280, user-scalable=yes, viewport-fit=cover');
            }
          } catch (e) {}
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
